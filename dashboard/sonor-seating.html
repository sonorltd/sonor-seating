<!DOCTYPE html>
<html lang="en" data-theme="slate">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seating Configurator — Sonor</title>
  <link rel="icon" href="../data/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;family=DM+Mono:wght@400&amp;family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&amp;display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../sonor-db.js"></script>
  <script src="../data/sonor-app.js"></script>
  <script src="../data/sonor-brand.js"></script>
  <script src="../data/sonor-header.js"></script>
  <script src="../data/sonor-palette.js"></script>
  <script src="../data/sonor-shell.js"></script>
  <script src="../data/seating-config.js"></script>
  <script src="../data/seating-catalogue.js"></script>
  <script src="../data/seating-engine.js"></script>
  <script src="../data/seating-recommend.js"></script>
  <script src="../data/seating-app.js"></script>
  <script src="../data/backups/sonor-db-backup-latest.js"></script>
  <link rel="stylesheet" href="../data/brand.css">
  <link rel="stylesheet" href="../data/sonor-header.css">
  <link rel="stylesheet" href="../data/app-vars.css">
  <link rel="stylesheet" href="../data/sonor-components.css">
  <link rel="stylesheet" href="../data/sonor-shell.css">
  <style>
    /* LUXURY canvas = documented Brand Override (scoped to .sc; :root untouched, S-4.1). */
    body { background:#0d0b09; color:#e8e0cc; margin:0; font-family:'DM Sans',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
    #sonor-header.header { position:relative; z-index:5; }
    .sc { --gold:#c9a85c; --gold2:#e8c97a; --cream:#e8e0cc; --muted:#8a8070; --dim:#3a3028;
      --bg1:#141009; --bg2:#1c160f; --bg3:#241d14; --brd:rgba(201,168,92,.14); --brd2:rgba(255,255,255,.06); --cin:#8058a1;
      min-height:calc(100vh - 52px); display:flex; flex-direction:column;
      background:radial-gradient(1200px 500px at 50% -100px, rgba(201,168,92,.06), transparent), #0d0b09; }
    .sc * { box-sizing:border-box; }
    .sc a { color:var(--gold); }

    .topbar { display:flex; align-items:center; gap:16px; padding:14px 30px; border-bottom:1px solid var(--brd); flex-wrap:wrap; }
    .brandline { font-family:'Cormorant Garamond',serif; font-size:22px; letter-spacing:.06em; color:var(--gold); }
    .brandline i { font-style:italic; color:rgba(232,224,204,.4); font-size:15px; margin:0 6px; }
    .src-note { margin-left:auto; font-size:10.5px; letter-spacing:.04em; color:var(--muted); border:1px solid var(--brd); border-radius:20px; padding:4px 12px; }
    .src-supabase{ color:#5aad60; border-color:rgba(90,173,96,.3); } .src-cache,.src-seed{ color:#d4883a; border-color:rgba(212,136,58,.3); }

    .steps { display:flex; align-items:center; justify-content:center; gap:2px; padding:14px; border-bottom:1px solid var(--brd); flex-wrap:wrap; }
    .pill { display:flex; align-items:center; gap:8px; padding:6px 16px; border-radius:22px; font-size:12px; color:var(--muted); }
    .pill.done { color:rgba(201,168,92,.7); cursor:pointer; } .pill.active { background:rgba(201,168,92,.1); color:var(--gold); border:1px solid rgba(201,168,92,.25); }
    .pn { width:18px; height:18px; border-radius:50%; border:1.5px solid currentColor; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; }
    .pill.active .pn { background:var(--gold); color:#0d0b09; border-color:var(--gold); } .pill.done .pn { background:rgba(201,168,92,.5); color:#0d0b09; border-color:transparent; }
    .parr { color:var(--dim); }

    .body { flex:1; padding:34px clamp(20px,5vw,64px); max-width:1180px; margin:0 auto; width:100%; }
    .lead { margin-bottom:26px; }
    .lead h2 { font-family:'Cormorant Garamond',serif; font-weight:500; font-size:34px; letter-spacing:.02em; margin:0 0 6px; color:var(--cream); }
    .lead p { color:var(--muted); font-size:14px; margin:0; max-width:640px; line-height:1.6; }

    .panel { background:var(--bg2); border:1px solid var(--brd2); border-radius:12px; padding:18px 20px; }
    .ptt { font-size:10px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .opt-tag { font-weight:500; color:var(--muted); letter-spacing:.04em; text-transform:none; }
    .lbl { font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin:12px 0 8px; }
    .fld { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px; }
    .fld span { font-size:13px; color:var(--cream); }
    .fld input { width:110px; background:var(--bg3); border:1px solid var(--brd); border-radius:6px; color:var(--cream); padding:9px 12px; font-size:14px; font-family:'DM Mono',monospace; }
    .fld input:focus { outline:none; border-color:var(--gold); }
    .hint { font-size:11.5px; color:var(--muted); line-height:1.5; margin-top:6px; }
    .big { font-size:34px; font-family:'Cormorant Garamond',serif; color:var(--gold); }
    .opts { display:flex; gap:8px; flex-wrap:wrap; }
    .opt { min-width:42px; padding:9px 14px; border-radius:8px; border:1.5px solid var(--dim); background:none; color:var(--muted); font-size:13px; font-weight:600; cursor:pointer; transition:.15s; }
    .opt:hover { border-color:rgba(201,168,92,.4); color:var(--cream); } .opt.on { background:rgba(201,168,92,.12); border-color:var(--gold); color:var(--gold); }
    .chips { display:flex; gap:8px; flex-wrap:wrap; } .chip { padding:8px 14px; border-radius:22px; border:1.5px solid var(--dim); background:none; color:var(--muted); font-size:12.5px; cursor:pointer; transition:.15s; }
    .chip:hover { border-color:rgba(201,168,92,.4); color:var(--cream); } .chip.on { background:rgba(201,168,92,.12); border-color:var(--gold); color:var(--gold); }

    .layout-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
    @media(max-width:820px){ .layout-grid{ grid-template-columns:1fr; } }
    .roomview { margin-top:22px; display:flex; justify-content:center; padding:20px; background:var(--bg1); border:1px solid var(--brd2); border-radius:12px; }

    .mfr-sec { margin-bottom:34px; }
    .mfr-head { display:flex; align-items:center; gap:14px; padding:0 2px 12px; margin-bottom:16px; border-bottom:1px solid var(--brd); }
    .mfr-logo { height:30px; max-width:200px; object-fit:contain; filter:brightness(1.05); }
    .mfr-word { font-family:'Cormorant Garamond',serif; font-size:26px; letter-spacing:.06em; color:var(--gold); }
    .mfr-count { margin-left:auto; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); }
    .range-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; }
    .rcard { background:var(--bg2); border:1.5px solid var(--brd2); border-radius:14px; overflow:hidden; cursor:pointer; transition:.18s; display:flex; flex-direction:column; }
    .rcard:hover { border-color:rgba(201,168,92,.4); transform:translateY(-2px); } .rcard.sel { border-color:var(--gold); box-shadow:0 0 0 2px rgba(201,168,92,.2); }
    .rcard.dim { opacity:.72; } .rcard.dim:hover { opacity:1; }
    .rc-img { aspect-ratio:16/10; background:#0a0806 center/cover no-repeat; } .rc-noimg { display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:22px; color:rgba(201,168,92,.4); letter-spacing:.06em; }
    .rc-b { padding:15px 17px 17px; display:flex; flex-direction:column; gap:8px; flex:1; }
    .rc-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
    .rc-mfr { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); } .rc-name { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--gold); line-height:1.1; }
    .rec,.fit,.nofit { font-size:9.5px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; padding:3px 9px; border-radius:20px; white-space:nowrap; }
    .rec { background:var(--gold); color:#0d0b09; } .fit { background:rgba(90,173,96,.15); color:#7cc884; border:1px solid rgba(90,173,96,.3); } .nofit { background:rgba(212,136,58,.12); color:#e0a05a; border:1px solid rgba(212,136,58,.3); }
    .rc-style { font-size:11.5px; color:var(--muted); } .rc-price { font-size:13px; color:var(--cream); } .rc-price b { color:var(--gold); font-size:15px; }
    .rc-plus { display:flex; flex-wrap:wrap; gap:5px; } .plus { font-size:10px; color:#7cc884; }
    .rc-flags { display:flex; flex-direction:column; gap:4px; margin-top:2px; } .flag { font-size:10.5px; } .flag.warn { color:#e0a05a; } .flag.info { color:var(--muted); }

    .cfg-grid { display:grid; grid-template-columns:1fr 340px; gap:18px; align-items:start; } @media(max-width:860px){ .cfg-grid{ grid-template-columns:1fr; } }
    .cfg-left { display:flex; flex-direction:column; gap:14px; } .sticky { position:sticky; top:14px; }
    .swatches { display:flex; flex-wrap:wrap; gap:8px; } .sw { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:8px; border:1.5px solid var(--brd2); background:var(--bg3); color:var(--cream); font-size:12px; cursor:pointer; } .sw span { width:16px; height:16px; border-radius:50%; background:var(--c); border:1px solid rgba(255,255,255,.15); } .sw.on { border-color:var(--gold); }
    .cols { display:flex; flex-wrap:wrap; gap:6px; } .col { width:26px; height:26px; border-radius:50%; background:var(--c); border:2px solid rgba(255,255,255,.1); cursor:pointer; } .col.on { border-color:var(--gold); box-shadow:0 0 0 2px rgba(201,168,92,.25); }
    .acc { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--brd2); } .acc:last-child{ border:none; } .acc-n { font-size:13px; color:var(--cream); } .acc-p { font-size:11px; color:var(--muted); }
    .qty { display:flex; align-items:center; gap:10px; } .qty button { width:28px; height:28px; border-radius:50%; border:1.5px solid var(--dim); background:none; color:var(--muted); font-size:15px; cursor:pointer; } .qty button:hover { border-color:var(--gold); color:var(--gold); } .qty span { min-width:18px; text-align:center; color:var(--cream); font-weight:600; }
    .toggle { display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--cream); cursor:pointer; } .toggle input { accent-color:var(--gold); width:16px; height:16px; }
    .live { margin-top:14px; padding-top:14px; border-top:1px solid var(--brd); } .lt-row { display:flex; justify-content:space-between; align-items:baseline; } .lt-row b { font-size:22px; color:var(--gold); font-family:'Cormorant Garamond',serif; } .lt-sub { font-size:10px; color:var(--muted); margin-top:4px; }

    .summary { max-width:860px; margin:0 auto; } .sm-head { display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid var(--brd); padding-bottom:16px; margin-bottom:20px; } .sm-mfr { font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); } .sm-head h2 { font-family:'Cormorant Garamond',serif; font-weight:500; font-size:32px; margin:2px 0 0; color:var(--gold); } .sm-date { font-size:12px; color:var(--muted); }
    .strip { display:flex; flex-wrap:wrap; background:var(--bg2); border:1px solid var(--brd); border-radius:12px; overflow:hidden; margin-bottom:20px; } .cellx { flex:1; min-width:150px; padding:14px 18px; border-right:1px solid var(--brd); } .cellx:last-child{ border:none; } .cl { font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); } .cv { font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--cream); margin-top:3px; } .cn { font-size:10px; color:var(--muted); margin-top:2px; }
    .planbig { background:var(--bg1); border:1px solid var(--brd2); border-radius:12px; padding:22px; display:flex; justify-content:center; margin-bottom:20px; }
    .quote { width:100%; border-collapse:collapse; font-size:13px; margin-bottom:18px; } .quote th { text-align:left; font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); padding:8px 10px; border-bottom:1px solid var(--brd); } .quote td { padding:11px 10px; border-bottom:1px solid var(--brd2); color:var(--cream); } .quote .r { text-align:right; } .quote .tot td { font-weight:700; color:var(--gold); border-top:1px solid var(--brd); }
    .actions { display:flex; gap:10px; } .disc { font-size:11px; color:var(--muted); margin-top:16px; line-height:1.5; }
    .empty { padding:60px; text-align:center; color:var(--muted); }

    .footer { display:flex; justify-content:space-between; align-items:center; padding:16px 30px; border-top:1px solid var(--brd); background:rgba(13,11,9,.7); position:sticky; bottom:0; }
    .btn { padding:11px 26px; border-radius:8px; border:none; font-size:13px; font-weight:600; cursor:pointer; transition:.18s; } .btn.primary { background:var(--gold); color:#0d0b09; } .btn.primary:hover { background:var(--gold2); } .btn.primary:disabled { opacity:.4; cursor:not-allowed; } .btn.ghost { background:none; color:var(--gold); border:1px solid rgba(201,168,92,.35); } .btn.ghost:hover { background:rgba(201,168,92,.08); } .btn.sec { background:var(--bg3); color:var(--muted); border:1px solid var(--dim); }

    @media print { #sonor-header,.topbar,.steps,.footer,.actions { display:none!important; } body,.sc { background:#fff; color:#111; } .cv,.quote td,.sm-head h2 { color:#111; } }
  </style>
</head>
<body>
  <header class="header" id="sonor-header"></header>
  <div class="sc">
    <div class="topbar"><span class="brandline">Seating Configurator</span><span class="src-note" id="sourceNote">Loading…</span></div>
    <div class="steps" id="stepPills"></div>
    <div class="body" id="stepBody"><div class="empty">Loading…</div></div>
    <div class="footer">
      <button class="btn sec" id="btnBack" onclick="SeatingApp.goBack()" style="visibility:hidden">← Back</button>
      <button class="btn primary" id="btnNext" disabled>Continue →</button>
    </div>
  </div>
  <script>
    const APP_VERSION = '0.2.2';
    SonorShell.mount({ appKey:'seating', appName:'Seating Configurator', repo:'sonor-seating', version:APP_VERSION, faviconHref:'../data/favicon.svg', assetBase:'../data/', supabase:false, palette:{ self:'seating' } });
    SeatingApp.boot();
  </script>
</body>
</html>
